<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrador – NAPNE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="acessibilidade">
      <button type="button" id="btnAmais">A+</button>
      <button type="button" id="btnAmenos">A-</button>
      <button type="button" id="btnContraste">Alto Contraste</button>
    </div>
    <header>
      <h2>Administração</h2>
      <a href="index.html" class="sair">Sair</a>
    </header>
    <div class="card">
      <h3>Cadastrar Usuário</h3>
      <label>Nome:</label><input type="text">
      <label>E‑mail:</label><input type="email">
      <label>Perfil:</label>
      <select>
        <option>Aluno</option>
        <option>Professor</option>
        <option>Administrador</option>
      </select>
      <button class="btn-primario">Cadastrar</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
