<!DOCTYPE html>
<html lang="pt‑BR">
<head>
  <meta charset="UTF‑8">
  <meta name="viewport" content="width=device‑width, initial‑scale=1.0">
  <title>Sistema NAPNE – Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login‑box">
    <h1>Sistema de Acompanhamento Acadêmico – NAPNE IFRS</h1>

    <div class="acessibilidade">
      <button type="button" id="btnAmais">A+</button>
      <button type="button" id="btnAmenos">A‑</button>
      <button type="button" id="btnContraste">Alto Contraste</button>
    </div>

    <form id="formLogin">
      <label for="usuario">Usuário</label>
      <input type="text" id="usuario" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" required>

      <button type="submit">Entrar</button>
      <p id="erro"></p>
    </form>

    <a href="#" class="link">Esqueci minha senha</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
